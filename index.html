<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUMTRIX</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:#fff;font-family:'Segoe UI',sans-serif;text-align:center;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;padding:30px 15px;
  }
  h1{
    font-size:clamp(28px,6vw,48px);
    letter-spacing:3px;margin-bottom:6px;
    background:linear-gradient(90deg,#0a84ff,#00e5ff);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{color:#aaa;font-size:14px;margin-bottom:30px}

  .grid{
    display:grid;
    grid-template-columns:repeat(5,minmax(60px,80px));
    gap:18px;justify-content:center;margin-bottom:25px;
    max-width:500px;width:100%;
  }
  .num{
    aspect-ratio:1/1;background:rgba(255,255,255,0.05);
    border:2px solid #444;border-radius:16px;
    font-size:clamp(18px,4vw,26px);font-weight:600;color:#fff;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all .25s ease;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
    backdrop-filter:blur(4px);
  }
  .num:hover{background:#0a84ff;border-color:#0a84ff;transform:translateY(-4px);
    box-shadow:0 8px 18px rgba(10,132,255,.4)}

  .num.pop{animation:pop .35s ease}
  @keyframes pop{
    0%{transform:scale(1)}
    40%{transform:scale(1.3);background:#0a84ff}
    100%{transform:scale(0)}
  }
  .num.used{background:#0a0a12;border-color:#333;color:#555;cursor:not-allowed;
    position:relative;box-shadow:none}
  .num.used::after{content:"✕";position:absolute;color:#ff4d4d;font-size:clamp(20px,5vw,30px)}

  .grid.hidden{display:none}

  video{
    display:none;width:100%;max-width:640px;border-radius:14px;
    background:#000;box-shadow:0 10px 30px rgba(0,0,0,.5);
  }
  video.show{display:block}

  #back{
    display:none;margin-top:20px;padding:10px 26px;
    background:linear-gradient(90deg,#0a84ff,#00c6ff);color:#fff;
    border:none;border-radius:30px;cursor:pointer;font-size:16px;font-weight:600;
    box-shadow:0 4px 14px rgba(10,132,255,.4);transition:transform .2s;
  }
  #back:hover{transform:scale(1.05)}
  #back.show{display:inline-block}

  footer{
    margin-top:auto;padding-top:40px;color:#777;font-size:12px;
    line-height:1.6;max-width:500px;
  }
  footer b{color:#aaa}

  #thanks{
    display:none;text-align:center;animation:fadeIn .6s ease;
  }
  #thanks.show{display:block}
  #thanks h2{
    font-size:clamp(26px,6vw,42px);
    background:linear-gradient(90deg,#00e5ff,#0a84ff,#ff4d9e);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:glow 1.8s ease-in-out infinite alternate;
  }
  #thanks p{color:#aaa;margin-top:10px;font-size:16px}
  @keyframes fadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
  @keyframes glow{
    from{filter:drop-shadow(0 0 5px #0a84ff)}
    to{filter:drop-shadow(0 0 20px #ff4d9e)}
  }

  /* mobile tweak */
  @media (max-width:480px){
    .grid{grid-template-columns:repeat(5,1fr);gap:10px}
    .num{border-radius:12px}
  }
</style>
</head>
<body>

<h1>NUMTRIX</h1>
<div class="sub">tap a number to play</div>

<div class="grid" id="grid"></div>
<video id="player" controls playsinline></video>
<button id="back">⬅ Back</button>

<div id="thanks">
  <h2>🎉 Thank You for Participating 🎉</h2>
  <p>All numbers completed</p>
</div>

<footer>
  <b>Project Organized by S5 BCA Students</b><br>
  Goutham • Yadhu • Justin • Anju • Suryagayathri
</footer>

<script>
const videos = {
  1:"video1.mp4", 2:"video2.mp4", 3:"video3.mp4", 4:"video4.mp4", 5:"video5.mp4",
  6:"video6.mp4", 7:"video7.mp4", 8:"video8.mp4", 9:"video9.mp4", 10:"video10.mp4"
};

const grid = document.getElementById('grid');
const player = document.getElementById('player');
const backBtn = document.getElementById('back');
const used = new Set();

for(let i=1;i<=10;i++){
  const btn = document.createElement('div');
  btn.className='num';
  btn.textContent=i;
  btn.onclick=()=>{
    if(used.has(i)) return;
    btn.classList.add('pop');
    setTimeout(()=>{
      used.add(i);
      btn.textContent='';
      btn.classList.remove('pop');
      btn.classList.add('used');
      grid.classList.add('hidden');
      player.src = videos[i];
      player.classList.add('show');
      player.play();
      backBtn.classList.add('show');
    },300);
  };
  grid.appendChild(btn);
}

backBtn.onclick=()=>{
  player.pause();
  player.classList.remove('show');
  backBtn.classList.remove('show');

  if(used.size === 10){
    document.getElementById('thanks').classList.add('show');
  } else {
    grid.classList.remove('hidden');
  }
};
</script>

</body>
</html>
